# Builds the cloud execution image and publishes it to the GitHub Container
# Registry, which is free for public repositories. Cloud Batch pulls the image
# from there, so a simulation never has to compile anything itself.

name: Build cloud image

on:
  push:
    branches: [main]
    paths:
      - 'R/**'
      - 'src/**'
      - 'inst/app/**'
      - 'inst/cloud/**'
      - 'DESCRIPTION'
      - 'NAMESPACE'
      - '.github/workflows/build-image.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out the source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Sign in to the container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Work out the image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and publish
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./inst/cloud/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test the published package
        shell: bash
        run: |
          IMAGE="${REGISTRY}/${IMAGE_NAME}:latest"
          docker pull "${IMAGE}"
          docker run --rm --entrypoint Rscript "${IMAGE}" -e \
            'library(craibm); stopifnot(is.function(run_selected_cpp), is.function(cloud_submit_batch), is.function(run_simulation_sizelimit_cpp))'
